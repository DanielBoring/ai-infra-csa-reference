openapi: "3.0.3"
info:
  title: Chat API
  description: |
    Chat completions API fronted by Azure API Management.
    Default backend is a Foundry API stub that returns mock responses.
    Upgrade to a real Azure AI Foundry endpoint by changing the APIM backend config.
  version: "1.0.0"
  contact:
    name: AI Infrastructure CSA Reference

servers:
  - url: https://{apimName}.azure-api.net/chat
    description: APIM Gateway
    variables:
      apimName:
        default: apim-ai-infra-ref-dev

paths:
  /completions:
    post:
      operationId: chatCompletions
      summary: Create a chat completion
      description: |
        Sends a chat message and returns an AI-generated completion.
        Compatible with Azure OpenAI Chat Completions API schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
            example:
              messages:
                - role: user
                  content: "Hello, how can you help me?"
      responses:
        "200":
          description: Successful completion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
              example:
                id: "chatcmpl-stub-abc12345"
                object: "chat.completion"
                created: 1712505600
                model: "gpt-4o-stub"
                choices:
                  - index: 0
                    message:
                      role: assistant
                      content: "[STUB] This is a mock response."
                    finish_reason: stop
                usage:
                  prompt_tokens: 10
                  completion_tokens: 42
                  total_tokens: 52
        "400":
          description: Invalid request
        "429":
          description: Rate limit exceeded
        "503":
          description: Backend unavailable

components:
  schemas:
    ChatCompletionRequest:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
          minItems: 1

    ChatMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string

    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            $ref: "#/components/schemas/ChatChoice"
        usage:
          $ref: "#/components/schemas/Usage"

    ChatChoice:
      type: object
      properties:
        index:
          type: integer
        message:
          $ref: "#/components/schemas/ChatMessage"
        finish_reason:
          type: string

    Usage:
      type: object
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer
